<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>chargeFUZE · Sales Champion Training 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#04060e;--bg2:#0a0e1d;--glass:rgba(255,255,255,.035);--glass2:rgba(255,255,255,.06);
--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.14);
--cyan:#26d9ff;--volt:#b4f13c;--gold:#ffc233;--indigo:#7c6cff;--red:#ff5c5c;--green:#3ddc84;
--txt:#f2f6ff;--dim:rgba(235,242,255,.72);--muted:#7b89a8;
--grad:linear-gradient(90deg,#7c6cff,#26d9ff 50%,#b4f13c);
--r:18px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
h1,h2,h3,.disp{font-family:'Space Grotesk',sans-serif}
/* ambient background */
.orb{position:fixed;border-radius:50%;filter:blur(90px);opacity:.35;z-index:-2;pointer-events:none}
.orb1{width:560px;height:560px;background:radial-gradient(circle,#1345c0,transparent 65%);top:-180px;left:-120px;animation:drift1 26s ease-in-out infinite alternate}
.orb2{width:480px;height:480px;background:radial-gradient(circle,#0b7f96,transparent 65%);bottom:-160px;right:-100px;animation:drift2 32s ease-in-out infinite alternate}
.orb3{width:340px;height:340px;background:radial-gradient(circle,rgba(148,255,60,.35),transparent 65%);top:40%;left:60%;animation:drift1 40s ease-in-out infinite alternate-reverse}
@keyframes drift1{to{transform:translate(120px,80px) scale(1.15)}}
@keyframes drift2{to{transform:translate(-100px,-70px) scale(1.1)}}
body::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);background-size:34px 34px;mask-image:radial-gradient(ellipse at 50% 0%,black 20%,transparent 75%)}
#fx{position:fixed;inset:0;z-index:999;pointer-events:none}
/* nav */
.nav{position:sticky;top:0;z-index:200;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(4,6,14,.72);backdrop-filter:blur(20px);border-bottom:1px solid var(--line)}
.logo-img{height:26px;display:block;cursor:pointer}
.nav-right{display:flex;align-items:center;gap:14px}
.nav-rep{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;color:var(--dim)}
.nav-link{font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:1px;color:var(--cyan);text-transform:uppercase;cursor:pointer;background:none;border:1px solid rgba(38,217,255,.28);padding:7px 14px;border-radius:999px;transition:all .2s}
.nav-link:hover{border-color:var(--cyan);background:rgba(38,217,255,.08);box-shadow:0 0 18px rgba(38,217,255,.18)}
.nav-batt{display:flex;align-items:center;gap:8px}
.nb-shell{width:44px;height:20px;border:2px solid var(--line2);border-radius:6px;padding:2px;position:relative}
.nb-shell::after{content:'';position:absolute;right:-6px;top:5px;width:4px;height:8px;background:var(--line2);border-radius:0 2px 2px 0}
.nb-fill{height:100%;background:var(--grad);border-radius:3px;transition:width .8s cubic-bezier(.22,1,.36,1);box-shadow:0 0 10px rgba(180,241,60,.5)}
.nb-pct{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;color:var(--volt)}
/* buttons */
.btn{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;padding:14px 30px;border:none;border-radius:999px;cursor:pointer;transition:transform .2s,box-shadow .2s,filter .2s;position:relative}
.btn:active{transform:scale(.97)}
.btn-c{background:linear-gradient(90deg,#1a9fd6,#26d9ff);color:#03121c;box-shadow:0 8px 30px rgba(38,217,255,.28)}
.btn-c:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(38,217,255,.42);filter:brightness(1.06)}
.btn-volt{background:linear-gradient(90deg,#8fd12c,#c5ff4a);color:#101a02;box-shadow:0 8px 30px rgba(180,241,60,.3)}
.btn-volt:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(180,241,60,.45)}
.btn-g{background:transparent;color:var(--cyan);border:1px solid rgba(38,217,255,.3)}
.btn-g:hover{border-color:var(--cyan);background:rgba(38,217,255,.06)}
/* generic card */
.glass{background:var(--glass);border:1px solid var(--line);border-radius:var(--r);backdrop-filter:blur(12px)}
/* entrance animations */
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes growX{from{transform:scaleX(0)}}
@keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-6px)}40%,60%{transform:translateX(6px)}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes spinA{to{transform:rotate(360deg)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 24px rgba(38,217,255,.15)}50%{box-shadow:0 0 44px rgba(38,217,255,.35)}}
.stagger>*{opacity:0;animation:rise .55s cubic-bezier(.22,1,.36,1) forwards}
.stagger>*:nth-child(1){animation-delay:.03s}.stagger>*:nth-child(2){animation-delay:.1s}.stagger>*:nth-child(3){animation-delay:.17s}.stagger>*:nth-child(4){animation-delay:.24s}.stagger>*:nth-child(5){animation-delay:.31s}.stagger>*:nth-child(6){animation-delay:.38s}.stagger>*:nth-child(7){animation-delay:.45s}.stagger>*:nth-child(8){animation-delay:.52s}.stagger>*:nth-child(9){animation-delay:.59s}.stagger>*:nth-child(10){animation-delay:.66s}
/* onboarding */
.ob-wrap{min-height:calc(100vh - 62px);display:flex;align-items:center;justify-content:center;padding:32px 20px}
.ob-card{width:100%;max-width:480px;padding:44px 42px;position:relative;background:var(--glass);border-radius:24px;border:1px solid var(--line);animation:pop .5s cubic-bezier(.22,1,.36,1) both;overflow:hidden}
.ob-card::before{content:'';position:absolute;inset:-2px;border-radius:26px;padding:2px;background:conic-gradient(from var(--ang,0deg),#7c6cff,#26d9ff,#b4f13c,#7c6cff);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.5;animation:spinBorder 6s linear infinite;pointer-events:none}
@property --ang{syntax:'<angle>';initial-value:0deg;inherits:false}
@keyframes spinBorder{to{--ang:360deg}}
.ob-eyebrow{font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:3px;color:var(--cyan);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.ob-eyebrow::before{content:'';width:22px;height:2px;background:var(--grad);border-radius:2px}
.ob-h1{font-size:clamp(32px,6vw,44px);font-weight:700;letter-spacing:-1.2px;line-height:1.05;margin-bottom:12px}
.ob-h1 .gt{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.ob-sub{font-size:14px;color:var(--muted);line-height:1.65;margin-bottom:28px}
.ob-form{display:flex;flex-direction:column;gap:15px}
.ob-field{display:flex;flex-direction:column;gap:6px}
.ob-label{font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.ob-input,.ob-select{background:rgba(0,0,0,.35);border:1px solid var(--line);color:var(--txt);padding:13px 16px;font-size:15px;font-family:'Inter',sans-serif;outline:none;border-radius:12px;transition:border-color .2s,box-shadow .2s}
.ob-input::placeholder{color:#4d5c78}
.ob-input:focus,.ob-select:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(38,217,255,.12)}
.ob-select option{background:#0a0e1d;color:var(--txt)}
.ob-row{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.ob-error{font-size:13px;color:var(--red)}
.ob-footer{display:flex;align-items:center;justify-content:center;gap:22px;margin-top:32px;padding-top:22px;border-top:1px solid var(--line)}
.ob-stat{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;text-align:center}
.ob-stat span{display:block;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:400;margin-top:3px}
.ob-divider{width:1px;height:28px;background:var(--line)}
.bolt-badge{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,rgba(38,217,255,.15),rgba(180,241,60,.15));border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:20px;animation:floaty 3.5s ease-in-out infinite}
/* home */
.home{max-width:920px;margin:0 auto;padding:52px 28px 120px}
.hero-eyebrow{font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:4px;color:var(--cyan);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.hero-eyebrow::before{content:'';width:28px;height:2px;background:var(--grad);border-radius:2px}
.hero-h1{font-size:clamp(40px,8vw,72px);font-weight:700;letter-spacing:-2.5px;line-height:1.02;margin-bottom:16px}
.hero-h1 .gt{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero-desc{font-size:16px;color:var(--muted);max-width:520px;line-height:1.7;margin-bottom:34px}
/* charge meter */
.charge-box{padding:24px 26px;margin-bottom:14px}
.charge-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.charge-label{font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.charge-pct{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:34px;color:var(--volt);line-height:1}
.batt{display:flex;align-items:center;gap:5px}
.batt-body{flex:1;height:34px;border:2px solid var(--line2);border-radius:10px;padding:4px;position:relative;overflow:hidden}
.batt-cap{width:6px;height:16px;background:var(--line2);border-radius:0 3px 3px 0}
.batt-fill{height:100%;background:var(--grad);border-radius:6px;transform-origin:left;animation:growX 1.3s cubic-bezier(.22,1,.36,1) both;position:relative;overflow:hidden;box-shadow:0 0 18px rgba(180,241,60,.35)}
.batt-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.35) 50%,transparent 70%);animation:sheen 2.6s ease-in-out infinite}
@keyframes sheen{0%{transform:translateX(-120%)}60%,100%{transform:translateX(220%)}}
.batt-segs{position:absolute;inset:4px;display:grid;grid-template-columns:repeat(4,1fr);pointer-events:none}
.batt-segs i{border-right:2px solid rgba(4,6,14,.8)}
.batt-segs i:last-child{border:none}
.charge-sub{font-size:12px;color:var(--muted);margin-top:12px;display:flex;align-items:center;gap:8px}
.charge-sub .zap{animation:pulse 1.6s ease-in-out infinite}
/* module cards */
.cards{display:flex;flex-direction:column;gap:14px;margin-top:34px}
.mcard{display:flex;align-items:center;gap:20px;padding:22px 24px;background:var(--glass);border:1px solid var(--line);border-radius:20px;cursor:pointer;transition:transform .25s cubic-bezier(.22,1,.36,1),border-color .25s,box-shadow .25s,background .25s;position:relative;overflow:hidden}
.mcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--ac);opacity:.9}
.mcard::after{content:'';position:absolute;inset:0;background:radial-gradient(600px circle at var(--mx,50%) var(--my,50%),rgba(38,217,255,.07),transparent 45%);opacity:0;transition:opacity .3s;pointer-events:none}
.mcard:hover:not(.locked){transform:translateY(-4px);border-color:rgba(38,217,255,.4);box-shadow:0 22px 60px rgba(0,0,0,.5),0 0 30px rgba(38,217,255,.1)}
.mcard:hover:not(.locked)::after{opacity:1}
.mcard.locked{opacity:.38;cursor:not-allowed;filter:saturate(.4)}
.mcard.cdone{border-color:rgba(61,220,132,.3)}
.micon{width:66px;height:66px;border-radius:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:27px;background:linear-gradient(135deg,color-mix(in srgb,var(--ac) 22%,transparent),color-mix(in srgb,var(--ac) 6%,transparent));border:1px solid color-mix(in srgb,var(--ac) 35%,transparent);overflow:hidden}
.micon svg{display:block}
.icon-batt{animation:floaty 3.5s ease-in-out infinite}
.icon-batt .bolt{animation:boltGlow 2.4s ease-in-out infinite}
@keyframes boltGlow{0%,100%{filter:drop-shadow(0 0 2px rgba(38,217,255,.7))}50%{filter:drop-shadow(0 0 7px rgba(38,217,255,1))}}
.icon-sign .sig{stroke-dasharray:46;stroke-dashoffset:46;animation:sigDraw 3s ease-in-out infinite}
@keyframes sigDraw{0%,12%{stroke-dashoffset:46}55%,78%{stroke-dashoffset:0}100%{stroke-dashoffset:-46}}
.icon-sign .stamp{opacity:0;transform-origin:34px 37px;animation:stampIn 3s ease-in-out infinite}
@keyframes stampIn{0%,55%{opacity:0;transform:scale(.4)}65%,85%{opacity:1;transform:scale(1)}100%{opacity:0}}
.icon-bal{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-family:'Space Grotesk',sans-serif;width:100%}
.bal-num{font-size:15px;font-weight:700;color:var(--green);line-height:1;font-variant-numeric:tabular-nums}
.bal-sub{font-size:6.5px;letter-spacing:1px;color:var(--gold);text-transform:uppercase;font-weight:600;display:flex;align-items:center;gap:2px}
.bal-arrow{font-size:9px;color:var(--green);animation:balBob 1.2s ease-in-out infinite;line-height:1}
@keyframes balBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.mbody{flex:1;min-width:0}
.mcode{font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.mtitle{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:21px;letter-spacing:-.4px;margin-bottom:3px}
.msub{font-size:13px;color:var(--muted);line-height:1.5}
.mfoot{display:flex;align-items:center;gap:12px;margin-top:10px}
.mdur{font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
.chip{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;padding:4px 12px;text-transform:uppercase;border-radius:999px;border:1px solid}
.chip-go{background:rgba(38,217,255,.1);color:var(--cyan);border-color:rgba(38,217,255,.3);animation:glowPulse 2.2s ease-in-out infinite}
.chip-ok{background:rgba(61,220,132,.1);color:var(--green);border-color:rgba(61,220,132,.3)}
.chip-lk{background:rgba(255,255,255,.03);color:var(--muted);border-color:var(--line)}
.mscore{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;color:var(--green)}
.marrow{font-size:20px;color:var(--muted);transition:transform .25s,color .25s}
.mcard:hover:not(.locked) .marrow{transform:translateX(5px);color:var(--cyan)}
/* lesson */
.lesson-wrap{max-width:840px;margin:0 auto;padding:0 28px 120px}
.lhdr{padding:36px 0 26px;border-bottom:1px solid var(--line);margin-bottom:34px}
.back{font-family:'Space Grotesk',sans-serif;font-size:12px;letter-spacing:1px;color:var(--cyan);text-transform:uppercase;cursor:pointer;border:none;background:none;padding:0;margin-bottom:18px;display:inline-flex;align-items:center;gap:8px}
.back:hover{opacity:.65}
.lnum{font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:4px;color:var(--cyan);text-transform:uppercase;margin-bottom:8px}
.ltitle{font-size:clamp(30px,5vw,46px);font-weight:700;letter-spacing:-1.4px;line-height:1.02;margin-bottom:6px}
.lsub{font-size:14px;color:var(--muted);margin-bottom:20px}
.slide-bar{display:flex;align-items:center;gap:12px}
.strack{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.sfill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.22,1,.36,1);box-shadow:0 0 12px rgba(38,217,255,.4)}
.slabel{font-family:'Space Grotesk',sans-serif;font-size:11px;color:var(--muted);letter-spacing:2px;white-space:nowrap}
.sh{font-size:clamp(24px,4vw,34px);font-weight:700;letter-spacing:-.8px;margin-bottom:12px;line-height:1.08}
.sb{font-size:15px;color:var(--dim);line-height:1.85;font-weight:300;margin-bottom:22px;max-width:700px}
.callout{border-left:3px solid var(--volt);padding:16px 22px;background:rgba(180,241,60,.05);border-radius:0 14px 14px 0;font-size:14px;font-style:italic;color:var(--dim);line-height:1.75;margin-top:6px}
.lnav{display:flex;justify-content:space-between;align-items:center;padding-top:30px;margin-top:38px;border-top:1px solid var(--line)}
.lindic{font-family:'Space Grotesk',sans-serif;font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
/* slide content blocks */
.bstat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:6px}
.bstat{background:var(--glass);border:1px solid var(--line);border-radius:16px;padding:26px 12px;text-align:center;transition:transform .25s,border-color .25s}
.bstat:hover{transform:translateY(-3px);border-color:rgba(38,217,255,.3)}
.bstat-n{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:34px;line-height:1;display:block;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.bstat-l{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:8px;line-height:1.4}
.vmap{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.vmap-row{background:var(--glass);border:1px solid var(--line);border-radius:14px;padding:15px 18px;display:grid;grid-template-columns:34px 160px 1fr;align-items:start;gap:14px;transition:transform .2s,border-color .2s,background .2s}
.vmap-row:hover{background:var(--glass2);border-color:rgba(38,217,255,.25);transform:translateX(4px)}
.vmap-icon{font-size:19px;padding-top:1px}
.vmap-cat{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:var(--cyan);padding-top:3px;letter-spacing:.3px}
.vmap-detail{font-size:13px;color:var(--muted);line-height:1.6}
.champ-list{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.champ-row{background:var(--glass);border:1px solid var(--line);border-radius:14px;padding:15px 18px;display:flex;align-items:flex-start;gap:15px;transition:transform .2s,border-color .2s}
.champ-row:hover{transform:translateX(4px);border-color:rgba(180,241,60,.3)}
.champ-icon{font-size:20px;flex-shrink:0;min-width:28px}
.champ-text{font-size:14px;color:var(--dim);line-height:1.65;padding-top:1px}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:6px}
.pcard{background:var(--glass);border:1px solid var(--line);border-radius:18px;padding:22px;position:relative;overflow:hidden;transition:transform .25s,box-shadow .25s}
.pcard:hover{transform:translateY(-5px);box-shadow:0 18px 50px rgba(0,0,0,.45)}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--pc)}
.ptag{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;display:inline-block;padding:3px 10px;border:1px solid;border-radius:999px;margin-bottom:12px}
.pname{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:42px;line-height:1;margin-bottom:4px;letter-spacing:-1px}
.pdesc{font-size:12px;color:var(--muted);line-height:1.65;margin-bottom:14px}
.pspecs{list-style:none;margin-bottom:12px}
.pspecs li{font-size:11px;color:var(--dim);padding:5px 0 5px 16px;position:relative;border-bottom:1px solid rgba(255,255,255,.05)}
.pspecs li span{position:absolute;left:0;font-size:10px;color:var(--volt)}
.pbest{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);opacity:.7;line-height:1.5}
.pitchlist{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.pch{display:grid;grid-template-columns:100px 1fr;overflow:hidden;border:1px solid var(--line);border-radius:14px}
.pchlbl{background:rgba(38,217,255,.08);padding:16px 10px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;color:var(--cyan);letter-spacing:1px;text-align:center;line-height:1.4}
.pchscript{background:var(--glass);padding:16px 20px;font-size:13.5px;color:var(--dim);font-style:italic;line-height:1.8}
.objlist{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.ocard-obj{background:var(--glass);border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:border-color .2s}
.ocard-obj:hover{border-color:rgba(255,92,92,.3)}
.oq{padding:13px 18px;background:rgba(255,92,92,.06);font-size:14px;font-weight:600;border-bottom:1px solid var(--line)}
.oa{padding:13px 18px;font-size:13.5px;color:var(--dim);line-height:1.75;border-left:3px solid var(--volt)}
.steps{display:flex;flex-direction:column;margin-top:6px;position:relative}
.step{padding:14px 0 14px 52px;display:flex;align-items:flex-start;font-size:14px;color:var(--dim);line-height:1.65;position:relative}
.step::before{content:'';position:absolute;left:17px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,rgba(38,217,255,.35),rgba(180,241,60,.25))}
.step:first-child::before{top:22px}.step:last-child::before{bottom:auto;height:22px}
.stepn{position:absolute;left:0;top:10px;width:36px;height:36px;border-radius:12px;background:rgba(38,217,255,.09);border:1px solid rgba(38,217,255,.3);color:var(--cyan);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center}
.ttable{width:100%;border-collapse:separate;border-spacing:0 8px;margin-top:6px}
.ttable th{padding:6px 16px;font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:left}
.ttable td{padding:16px;font-size:13px;color:var(--dim);background:var(--glass);border-top:1px solid var(--line);border-bottom:1px solid var(--line);vertical-align:middle}
.ttable td:first-child{border-left:1px solid var(--line);border-radius:14px 0 0 14px}
.ttable td:last-child{border-right:1px solid var(--line);border-radius:0 14px 14px 0}
.ttier{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:28px!important;line-height:1}
.tpay{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:21px!important;line-height:1}
/* quiz */
.qwrap{background:var(--glass);border:1px solid var(--line);border-radius:22px;padding:34px;margin-top:6px;position:relative;overflow:hidden}
.qwrap::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad)}
.qtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.qey{font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:3px;color:var(--cyan);text-transform:uppercase}
.streak{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;color:var(--gold);background:rgba(255,194,51,.08);border:1px solid rgba(255,194,51,.28);padding:5px 14px;border-radius:999px;display:none;align-items:center;gap:6px}
.streak.on{display:inline-flex}
.streak.pop{animation:pop .4s cubic-bezier(.22,1,.36,1)}
.qdots{display:flex;gap:7px;margin-bottom:20px}
.qd{width:22px;height:6px;border-radius:99px;background:rgba(255,255,255,.08);transition:all .3s}
.qd-a{background:var(--cyan);box-shadow:0 0 10px rgba(38,217,255,.5);width:34px}
.qd-ok{background:var(--green)}.qd-no{background:var(--red)}
.qq{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:21px;line-height:1.35;margin-bottom:20px;letter-spacing:-.3px}
.qnum{color:var(--cyan);margin-right:8px}
.qopts{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.qo{padding:15px 20px;background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:14px;cursor:pointer;font-size:14.5px;font-family:'Inter',sans-serif;color:var(--dim);transition:all .18s;text-align:left;width:100%;position:relative}
.qo:hover:not(:disabled){border-color:var(--cyan);color:var(--txt);background:rgba(38,217,255,.06);transform:translateX(5px)}
.qo:disabled{cursor:default}
.qo-ok{border-color:var(--green)!important;background:rgba(61,220,132,.1)!important;color:var(--green)!important;animation:pop .35s cubic-bezier(.22,1,.36,1)}
.qo-no{border-color:var(--red)!important;background:rgba(255,92,92,.1)!important;color:var(--red)!important;animation:shake .45s}
.qfb{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;margin-bottom:14px;animation:rise .3s both}
/* score screens */
.score-hero{text-align:center;padding:16px 0 8px}
.ring-wrap{position:relative;display:inline-block;margin-bottom:14px}
.ring-fg{animation:ringIn 1.3s cubic-bezier(.22,1,.36,1) forwards}
@keyframes ringIn{to{stroke-dashoffset:var(--off)}}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:44px;line-height:1}
.ring-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px}
.qscore-sub{color:var(--muted);font-size:14px;margin:6px 0 20px}
.charge-chip{display:inline-flex;align-items:center;gap:8px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:var(--volt);background:rgba(180,241,60,.08);border:1px solid rgba(180,241,60,.3);padding:7px 18px;border-radius:999px;margin-bottom:22px;animation:pop .5s .6s cubic-bezier(.22,1,.36,1) both}
/* results */
.res-card{background:var(--glass);border:1px solid var(--line);border-radius:18px;padding:24px}
.res-card h4{font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.res-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px}
.res-row:last-child{border:none}
.res-val{font-weight:600}
.sent-status{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:22px;font-family:'Space Grotesk',sans-serif;font-size:12px;letter-spacing:2px;color:var(--green);text-transform:uppercase}
/* dashboard */
.dash-wrap{max-width:980px;margin:0 auto;padding:40px 28px 120px}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px}
.dash-header h2{font-weight:700;font-size:30px;letter-spacing:-1px}
.dash-tabs{display:flex;gap:6px;flex-wrap:wrap}
.dash-tabs button{font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:8px 16px;border:1px solid var(--line);border-radius:999px;background:none;color:var(--muted);cursor:pointer;transition:all .2s}
.dash-tabs button.active{background:var(--cyan);color:#03121c;border-color:var(--cyan);font-weight:600}
.dash-tabs button:hover:not(.active){border-color:rgba(38,217,255,.35);color:var(--cyan)}
.dash-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:26px}
.dash-stat{background:var(--glass);border:1px solid var(--line);border-radius:16px;padding:20px 16px;text-align:center}
.dash-stat .ds-n{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:32px;color:var(--cyan);line-height:1}
.dash-stat .ds-l{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:6px}
.dash-table{width:100%;border-collapse:collapse;background:var(--glass);border:1px solid var(--line);border-radius:16px;overflow:hidden}
.dash-table th{padding:12px 14px;font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:left;background:rgba(255,255,255,.03);border-bottom:1px solid var(--line)}
.dash-table td{padding:13px 14px;font-size:13px;color:var(--dim);border-bottom:1px solid rgba(255,255,255,.05);vertical-align:top}
.dash-table tr:hover td{background:rgba(38,217,255,.025)}
.badge-pass{background:rgba(61,220,132,.1);color:var(--green);padding:3px 12px;font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:1px;font-weight:600;text-transform:uppercase;border:1px solid rgba(61,220,132,.25);border-radius:999px}
.badge-fail{background:rgba(255,92,92,.1);color:var(--red);padding:3px 12px;font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:1px;font-weight:600;text-transform:uppercase;border:1px solid rgba(255,92,92,.25);border-radius:999px}
.task-row{display:flex;flex-wrap:wrap;gap:7px}
.task-item{display:flex;align-items:center;gap:5px;cursor:pointer}
.task-box{width:18px;height:18px;border:2px solid var(--line2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .2s}
.task-box.done{background:var(--green);border-color:var(--green);color:#04160c}
.task-lbl{font-size:10px;color:var(--muted);letter-spacing:.5px}
.task-lbl.done{color:var(--green);text-decoration:line-through}
@media(max-width:640px){
.bstat-grid{grid-template-columns:1fr 1fr}.pgrid{grid-template-columns:1fr}
.vmap-row{grid-template-columns:34px 1fr}.vmap-detail{grid-column:2}
.pch{grid-template-columns:80px 1fr}.ob-row{grid-template-columns:1fr}
.ob-card{padding:34px 24px}.home{padding:36px 20px 80px}
.hero-h1{letter-spacing:-1.5px}
.mcard{flex-wrap:wrap}.dash-header{flex-direction:column;align-items:flex-start}
.nav{padding:0 16px}.nav-rep{display:none}
}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
</style>

{id:2,code:"03",title:"The Pitch",subtitle:"Approach · Script · Objections · Closing",icon:"🎯",dur:"12 min",accent:"#e74c3c",slides:[
{headline:"Timing & Approach.",body:"Visit off-peak — 2-4 PM weekdays for restaurants and bars. Ask for the decision-maker: 'Is the manager or owner available? I have a quick revenue opportunity.'",type:"text",callout:"Lead with value, not features. Start with what it does for them, not what the product is."},
{headline:"The 30-Second Pitch.",body:"Deliver this in under 30 seconds:",type:"pitch",scripts:[{label:"The Open",script:"'We work with [partner name] and [X] other venues in [city]. We place a phone charging station on your counter at no cost to you.'"},{label:"The Value",script:"'Your customers rent portable chargers, and you earn a share of every rental plus advertising revenue. Nothing to install, maintain, or pay for.'"},{label:"Soft Close",script:"'Can I show you the station? Based on your traffic, I think you'd do really well with this.'"}]},
{headline:"Handling Objections.",body:"You'll hear 'no' more than 'yes.' Here's how to handle the most common pushback:",type:"objections",objs:[{q:'"We already have charging cables."',a:"That's costing you money. Cables break, walk off, take staff time. chargeFUZE generates revenue instead — and customers take the charger to their table."},{q:'"No counter space."',a:"The F10 is the size of a toaster. We work with all venue sizes. Can I show you a photo from a similar spot?"},{q:'"We tried this before."',a:"Most older solutions were unreliable. chargeFUZE is used by BWW, Equinox, and Hyatt because the hardware works and the revenue share is real."},{q:'"How much does it cost?"',a:"Zero. No install fee, no monthly fee, no maintenance. You earn revenue from day one."},{q:'"I need to talk to the owner."',a:"Absolutely. Can I leave info and follow up Thursday at 2?"}]},
{headline:"After the Pitch.",body:"Whether it's a yes or a follow-up, here's what you do next:",type:"steps",steps:[
"Assign the venue in Blue — name, contact, location, deal status.",
"If follow-up is needed: schedule a specific date/time to reconnect. Never leave without a next step.",
"If it's a YES: walk through the order form with the venue manager on the spot.",
"Revenue split determination — start the conversation at 25% venue share.",
"Schedule delivery with the venue — confirm timeline and placement location.",
"Secure the contract signature before you leave. Digital or physical, get it signed."
]}
],quiz:[

/* ============ FX ENGINE: confetti + bursts ============ */
const fxC=document.createElement('canvas');fxC.id='fx';document.body.appendChild(fxC);
const fx=fxC.getContext('2d');let fxP=[],fxOn=false;
function fxSize(){fxC.width=innerWidth;fxC.height=innerHeight;}
addEventListener('resize',fxSize);fxSize();
const FX_COLORS=['#26d9ff','#b4f13c','#ffc233','#7c6cff','#ff5c8a','#3ddc84'];
function fxLoop(){
fx.clearRect(0,0,fxC.width,fxC.height);
fxP=fxP.filter(p=>p.life>0&&p.y<fxC.height+40);
for(const p of fxP){p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.vx*=.99;p.rot+=p.vr;p.life--;
fx.save();fx.translate(p.x,p.y);fx.rotate(p.rot);fx.globalAlpha=Math.max(0,Math.min(1,p.life/30));fx.fillStyle=p.c;
if(p.shape==='rect')fx.fillRect(-p.s/2,-p.s/4,p.s,p.s/2);
else{fx.beginPath();fx.arc(0,0,p.s/2,0,7);fx.fill();}
fx.restore();}
if(fxP.length)requestAnimationFrame(fxLoop);
else{fxOn=false;fx.clearRect(0,0,fxC.width,fxC.height);}
}
function fxKick(){if(!fxOn){fxOn=true;requestAnimationFrame(fxLoop);}}
function burst(x,y,n){n=n||26;for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*5;
fxP.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2.2,g:.13,s:4+Math.random()*5,c:FX_COLORS[i%6],rot:Math.random()*6,vr:(Math.random()-.5)*.3,life:38+Math.random()*28,shape:Math.random()<.5?'rect':'dot'});}
fxKick();}
function confetti(n){n=n||200;for(let i=0;i<n;i++){
fxP.push({x:Math.random()*fxC.width,y:-20-Math.random()*fxC.height*.6,vx:(Math.random()-.5)*2,vy:2+Math.random()*3,g:.035,s:6+Math.random()*7,c:FX_COLORS[i%6],rot:Math.random()*6,vr:(Math.random()-.5)*.25,life:220+Math.random()*140,shape:'rect'});}
fxKick();}

function countUp(el,dur){dur=dur||1100;const raw=el.dataset.target;const m=raw.match(/[\d][\d,\.]*/);
if(!m){el.textContent=raw;return;}

if(hasComma)v=Number(v).toLocaleString('en-US',{minimumFractionDigits:dec});
el.textContent=pre+v+suf;if(p<1)requestAnimationFrame(fr);}
requestAnimationFrame(fr);}

<div class="lesson-wrap" style="padding-top:56px;max-width:640px">
<div class="qwrap"><div class="score-hero">
${ringSVG(pct,good?'var(--green)':'var(--red)')}
<div class="qscore-sub">${qCorrect} of ${total} correct — Module ${l.code}: ${l.title}${bestStreak>1?` · best streak ⚡×${bestStreak}`:''}</div>
<div class="charge-chip">🔋 +${Math.round(100/LESSONS.length)}% charge</div>
<div><button class="btn btn-c" onclick="show('home')">${completed.length===LESSONS.length?'See Final Results →':'Keep Charging →'}</button></div>
</div></div></div>`;
runCounters();
if(good)setTimeout(()=>burst(innerWidth/2,innerHeight*.35,60),700);},

results(){const nums=Object.values(scores).filter(v=>typeof v==='number');
const avg=Math.round(nums.reduce((a,b)=>a+b,0)/nums.length);const pass=avg>=70;
R.innerHTML=`${nav({extra:''})}
<div class="lesson-wrap" style="padding-top:56px">
<div class="score-hero stagger" style="margin-bottom:40px">
<div class="hero-eyebrow" style="justify-content:center">${pass?'Certification Complete':'Training Complete'}</div>
<div style="font-size:58px;margin:14px 0;animation:floaty 3s ease-in-out infinite;display:inline-block">${pass?'🏆':'📋'}</div>
<div>${ringSVG(avg,pass?'var(--green)':'var(--red)',210)}</div>
<div class="disp" style="font-weight:700;font-size:22px;letter-spacing:-.4px;color:${pass?'var(--green)':'var(--red)'};margin-top:6px">${pass?'FULLY CHARGED — YOU PASSED':'NOT QUITE — BELOW 70%'}</div>
<div style="color:var(--muted);font-size:14px;margin-top:8px">${nums.length} modules completed · ${new Date().toLocaleDateString()}</div>
</div>
<div class="glass" style="border-top:3px solid ${pass?'var(--green)':'var(--red)'};padding:32px;margin-bottom:24px">
<div class="qey" style="margin-bottom:18px">${pass?'What Happens Next':'Next Steps'}</div>
${pass?`<div class="steps">
<div class="step"><div class="stepn">1</div><div><strong>Your Regional Manager will reach out within 1-2 business days</strong> to welcome you, confirm your DMA, and get you set up.</div></div>
<div class="step"><div class="stepn">2</div><div><strong>Check your email and Slack</strong> — your manager will send invites for your chargeFUZE email, Blue, and Slack.</div></div>
<div class="step"><div class="stepn">3</div><div><strong>Do not start venue visits until your manager contacts you.</strong> They will provide your DMA target list and go-to-market plan.</div></div>
<div class="step"><div class="stepn">4</div><div><strong>Keep your phone on and inbox clear.</strong> The faster you respond to your manager's outreach, the faster you start earning.</div></div>
</div>`:`<div class="steps">
<div class="step"><div class="stepn">1</div><div><strong>A score of 70% or higher is required to pass.</strong> Your score of ${avg}% did not meet the threshold.</div></div>
<div class="step"><div class="stepn">2</div><div><strong>Reach out to your Regional Manager</strong> to discuss retaking the training. They can provide guidance on the areas to review.</div></div>
</div><div style="text-align:center;margin-top:28px"><button class="btn btn-c" onclick="retakeTraining()">Retake Training →</button></div>`}
</div>
<div class="callout" style="margin-bottom:32px">${pass?'Your results have been submitted automatically. Your Regional Manager has been notified and will be in touch shortly.':'Your results have been recorded. Speak with your Regional Manager about next steps.'}</div>
<div class="res-card" style="margin-bottom:0"><h4>Submission Summary</h4>
<div class="res-row"><span>Name</span><span class="res-val">${rep.name}</span></div>
<div class="res-row"><span>Email</span><span class="res-val">${rep.email}</span></div>
<div class="res-row"><span>DMA</span><span class="res-val">${rep.dma}</span></div>
<div class="res-row"><span>Overall Score</span><span class="res-val" style="color:${pass?'var(--green)':'var(--red)'}">${avg}% — ${pass?'PASSED':'FAILED'}</span></div>
<div class="res-row"><span>Submitted</span><span class="res-val">${new Date().toLocaleString()}</span></div>
</div>
<div class="sent-status" style="margin-bottom:40px">✓ Results submitted · Manager notified via Slack</div>
</div>`;
runCounters();
if(pass){setTimeout(()=>confetti(220),400);setTimeout(()=>confetti(120),1600);}},

dashLogin(){R.innerHTML=`${nav({extra:'<button class="nav-link" onclick="show(\'home\')">← Training</button>'})}
<div class="ob-wrap"><div class="ob-card" style="max-width:400px">
<div class="ob-eyebrow">Manager Access</div>
<div class="ob-h1" style="font-size:34px">Dashboard<br><span class="gt">Login</span></div>
<div class="ob-sub">Enter the manager password to access the onboarding dashboard.</div>
<div class="ob-form">
<div class="ob-field"><div class="ob-label">Password</div><input class="ob-input" id="dash-pw" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkDashPW()"></div>
<div id="dash-err" class="ob-error"></div>
<button class="btn btn-c" onclick="checkDashPW()">Access Dashboard →</button>
</div></div></div>`;
setTimeout(()=>{const el=$('dash-pw');if(el)el.focus();},100);},

dashboard(){if(!dashUnlocked){show('dashLogin');return;}
R.innerHTML=`${nav({extra:'<button class="nav-link" onclick="show(\'home\')">← Training</button><button class="nav-link" onclick="dashUnlocked=false;show(\'home\')" style="border-color:var(--red);color:var(--red)">Lock</button>'})}
<div class="dash-wrap" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:16px">
<div style="width:40px;height:40px;border:3px solid rgba(38,217,255,.15);border-top-color:var(--cyan);border-radius:50%;animation:spinA .8s linear infinite"></div>
<div class="disp" style="font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase">Loading Dashboard...</div></div>`;
loadFromSheet(function(allData){renderDashWithData(allData);});
}
};

function renderDashWithData(all){
const filtered=dashFilter==='all'?all:all.filter(r=>r.manager===dashFilter);
const total=filtered.length,passed=filtered.filter(r=>r.pass).length,failed=total-passed,
fully=filtered.filter(r=>r.pass&&r.tasks&&r.tasks.email&&r.tasks.monday&&r.tasks.slack&&r.tasks.gusto&&r.tasks.welcome).length;
R.innerHTML=`${nav({extra:'<button class="nav-link" onclick="show(\'home\')">← Training</button><button class="nav-link" onclick="dashUnlocked=false;show(\'home\')" style="border-color:var(--red);color:var(--red)">Lock</button>'})}
<div class="dash-wrap"><div class="dash-header"><h2>Manager Dashboard</h2>
<div class="dash-tabs">
<button class="${dashFilter==='all'?'active':''}" onclick="setDashFilter('all')">All</button>
<button class="${dashFilter==='Chris'?'active':''}" onclick="setDashFilter('Chris')">Chris (LA/SD)</button>
<button class="${dashFilter==='Santi'?'active':''}" onclick="setDashFilter('Santi')">Santi (W/S)</button>
<button class="${dashFilter==='Shamel'?'active':''}" onclick="setDashFilter('Shamel')">Shamel (East)</button>
</div></div>
<div class="dash-stats stagger">
<div class="dash-stat"><div class="ds-n" data-target="${total}">0</div><div class="ds-l">Total Reps</div></div>
<div class="dash-stat"><div class="ds-n" style="color:var(--green)" data-target="${passed}">0</div><div class="ds-l">Passed</div></div>
<div class="dash-stat"><div class="ds-n" style="color:var(--red)" data-target="${failed}">0</div><div class="ds-l">Failed</div></div>
<div class="dash-stat"><div class="ds-n" style="color:var(--green)" data-target="${fully}">0</div><div class="ds-l">Fully Onboarded</div></div>
</div>
<div style="overflow-x:auto"><table class="dash-table"><thead><tr><th>Rep</th><th>DMA</th><th>Score</th><th>Status</th><th>Manager</th><th>Onboarding Tasks</th></tr></thead><tbody>
${filtered.length===0?'<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted)">No reps yet.</td></tr>':filtered.map(r=>{
const t=r.tasks||{email:false,monday:false,slack:false,gusto:false,welcome:false};
const items=[{k:'email',l:'Email'},{k:'monday',l:'Blue'},{k:'slack',l:'Slack'},{k:'gusto',l:'Gusto'},{k:'welcome',l:'Welcome'}];
return `<tr><td><strong>${r.name}</strong><br><span style="font-size:11px;color:var(--muted)">${r.email}</span></td><td>${r.dma}</td><td>${r.score}%</td><td><span class="${r.pass?'badge-pass':'badge-fail'}">${r.pass?'PASSED':'FAILED'}</span></td><td>${r.manager}</td><td><div class="task-row">${items.map(ti=>`<div class="task-item" onclick="toggleTask('${r.email}','${ti.k}')"><div class="task-box ${t[ti.k]?'done':''}">${t[ti.k]?'✓':''}</div><span class="task-lbl ${t[ti.k]?'done':''}">${ti.l}</span></div>`).join('')}</div></td></tr>`;}).join('')}
</tbody></table></div></div>`;
runCounters();}

/* ============ ACTIONS ============ */
window.submitOB=function(){
const name=$('f-name').value.trim(),email=$('f-email').value.trim(),phone=$('f-phone').value.trim(),dma=$('f-dma').value,date=$('f-date').value;
if(!name||!email||!dma){$('ob-err').textContent='Please fill in name, email, and DMA.';return;}
rep={name,email,phone,dma,date,manager:DMA_MGR[dma]||'Unassigned'};
completed=[];scores={};
burst(innerWidth/2,innerHeight/2,44);
setTimeout(()=>show('home'),250);};
window.openLesson=function(i){curLesson=i;curSlide=0;show('lesson');};
window.nextSlide=function(){curSlide++;show('lesson');};
window.prevSlide=function(){if(curSlide>0){curSlide--;show('lesson');}};
window.startQuiz=function(){curQ=0;qCorrect=0;qAnswered=false;streak=0;bestStreak=0;show('quiz');};
window.pickAnswer=function(idx,ev){
if(qAnswered)return;qAnswered=true;
const l=LESSONS[curLesson],q=l.quiz[curQ];
for(let i=0;i<q.opts.length;i++){const el=$('qo-'+i);el.disabled=true;
if(i===q.a)el.classList.add('qo-ok');
if(i===idx&&idx!==q.a)el.classList.add('qo-no');}
const right=idx===q.a;
if(right){qCorrect++;streak++;bestStreak=Math.max(bestStreak,streak);
const btn=$('qo-'+idx),r=btn.getBoundingClientRect();
burst(r.left+r.width/2,r.top+r.height/2,30);
const st=$('streak');if(streak>1){st.classList.add('on');st.textContent='⚡ '+streak+' streak';st.classList.remove('pop');void st.offsetWidth;st.classList.add('pop');}
}else{streak=0;const st=$('streak');if(st)st.classList.remove('on');}
const msgs=right?['✓ Correct — charged up!','✓ Nailed it.','✓ Correct — keep the streak alive!','✓ That\'s the one.']:['✗ Not quite — the right answer is highlighted.','✗ Missed it — check the green answer.'];
$('q-fb').innerHTML=`<div class="qfb" style="color:${right?'var(--green)':'var(--red)'}">${msgs[Math.floor(Math.random()*msgs.length)]}</div>`;
const isLast=curQ===l.quiz.length-1;
$('q-nav').innerHTML=`<button class="btn btn-c" onclick="${isLast?'finishQuiz()':'nextQ()'}" style="margin-top:8px">${isLast?'See Score →':'Next Question →'}</button>`;};
window.nextQ=function(){curQ++;qAnswered=false;show('quiz');};
window.finishQuiz=function(){show('quizScore');};
window.setDashFilter=function(f){dashFilter=f;renderDashCached();};
let _dashCache=null;
function renderDashCached(){if(_dashCache){renderDashWithData(_dashCache);}else{show('dashboard');}}
const _origRender=renderDashWithData;
renderDashWithData=function(all){_dashCache=all;_origRender(all);};
window.tryDash=function(){if(dashUnlocked){show('dashboard');}else{show('dashLogin');}};
window.checkDashPW=function(){const pw=$('dash-pw').value;if(pw===DASH_PASSWORD){dashUnlocked=true;show('dashboard');}else{$('dash-err').textContent='Incorrect password.';}};
window.toggleTask=function(repEmail,key){
updateTaskOnSheet(repEmail,key,'toggle');
var d=getDash();var r=d.find(x=>x.email===repEmail);
if(r){if(!r.tasks)r.tasks={email:false,monday:false,slack:false,gusto:false,welcome:false};r.tasks[key]=!r.tasks[key];saveDash(d);}
if(_dashCache){var c=_dashCache.find(x=>x.email===repEmail);if(c){if(!c.tasks)c.tasks={email:false,monday:false,slack:false,gusto:false,welcome:false};c.tasks[key]=!c.tasks[key];}}
renderDashWithData(_dashCache||d);
};
window.retakeTraining=function(){completed=[];scores={};show('home');};
show('onboarding');
</script>
</body>
</html>
