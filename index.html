{headline:"Where We Live.",body:"chargeFUZE is already embedded in the venues your prospects walk into every weekend. You're not introducing something new — you're bringing something they've already seen.",type:"vertmap",cats:[{icon:"🏟️",name:"Arenas & Stadiums",detail:"Madison Square Garden, US Open, Hard Rock venues, Live Nation — 300+ arena-level installs"},{icon:"🏨",name:"Hospitality",detail:"Hyatt Hotels, Moxy Hotels, boutique properties — guests need power from check-in to checkout"},{icon:"🏋️",name:"Gyms & Fitness",detail:"Equinox, Urban Air, fitness studios — members come daily, so do the rentals"},{icon:"🍺",name:"Bars & Restaurants",detail:"Buffalo Wild Wings, Fat Tuesday, hundreds of independents — high dwell, high volume"},{icon:"☕",name:"Cafés & QSR",detail:"Gregorys Coffee, Philz Coffee, Prince Street Pizza — guests linger, phones die, rentals happen"},{icon:"🎳",name:"Entertainment",detail:"Lucky Strike, arcades, event spaces — anywhere people gather and stay"}]},
{headline:"City Networks: 2026 Ground Game.",body:"We've proved the model at the top. Now we're going hyperlocal — saturating cities venue by venue so chargeFUZE becomes unavoidable.",type:"text",callout:'"Boosted Guest Experience. Effortless Passive Revenue. Over 1.5M users and growing."'},
{headline:"Your Lane. Your Income.",body:"You are a Sales Champion. 2,500+ pre-approved venues per market. You show up, pitch, and close. Everything after is handled — hardware, installation, maintenance, support.",type:"bullets",bullets:[{icon:"⚡",text:"2,500+ pre-approved venues — the list is built, you just work it"},{icon:"💰",text:"Uncapped commission — no quota cap, no earnings ceiling"},{icon:"🎯",text:"Zero lift after the close — install and ops fully handled"},{icon:"📈",text:"Bonuses stack — sprint bonus, leaderboard payouts, vertical multipliers"},{icon:"🕐",text:"Your schedule — no set hours, just results"}]}

{id:1,code:"02",title:"The Arsenal",subtitle:"F10 · F15 · F25 — Hardware, Batteries & Verticals",icon:"🔋",dur:"10 min",accent:"#f0b429",slides:[
{headline:"Three Units. Every Venue Covered.",body:"chargeFUZE deploys three hardware formats — each built for a specific venue type. Knowing which unit fits which door makes you a closer, not a visitor.",type:"products",products:[{name:"F10",tag:"COMPACT",color:"#00c2f0",desc:"Countertop. Plug-and-play. Size of a toaster. Live in 20 minutes.",specs:["10 battery slots","Countertop or stand","Digital screen","No install crew needed"],best:"Bars · Cafés · Small Gyms"},{name:"F15",tag:"MID-VOLUME",color:"#f0b429",desc:"Floor kiosk with full adFUZE display. For consistent-traffic venues.",specs:["15 battery slots","Floor kiosk","adFUZE display","Higher capacity"],best:"Hotels · Gyms · Restaurants"},{name:"F25",tag:"ARENA GRADE",color:"#2ecc71",desc:"Flagship. 125 lbs. Built for thousands per session. Runs at MSG and US Open.",specs:["25 battery slots","125 lbs heavy-duty","Premium display","Arena-level traffic"],best:"Arenas · Stadiums · Convention Centers"}]},
{headline:"The Battery.",body:"Guests unlock via app or credit card, charge anywhere in the venue, return at any chargeFUZE location nationwide.",type:"stats",stats:[{n:"8,000",l:"mAh Capacity"},{n:"3-in-1",l:"USB-C · Lightning · Micro"},{n:"FREE",l:"First 15 Min"},{n:"$5/hr",l:"After That"}]},
{headline:"Know Your Verticals.",body:"Best-performing locations share one trait: dwell time. The longer people stay, the more rentals happen.",type:"vertmap",cats:[{icon:"🏨",name:"Hospitality",detail:"Hotels & resorts — guests need power check-in to checkout. Revenue share is passive."},{icon:"🏋️",name:"Gyms & Fitness",detail:"Members come daily. Phones die mid-workout. High repeat rental rate."},{icon:"🍺",name:"Bars & Nightlife",detail:"2-4 hour sessions. Heavy phone use. Perfect rental window."},{icon:"🎳",name:"Entertainment",detail:"Bowling, arcades, immersive venues — hours of dwell time."},{icon:"🍽️",name:"Restaurants & Cafés",detail:"Meal duration = charging window. Volume drives the numbers."}]}
],quiz:[
{q:"Which unit fits a small bar with limited counter space?",opts:["F25 — always go big","F15 — floor kiosk","None — bars aren't a fit","F10 — compact countertop unit"],a:3},
{q:"What makes a venue 'high-value' for chargeFUZE?",opts:["Large parking lot","Rural location","High foot traffic with extended dwell time","Fewer than 50 daily customers"],a:2},
{q:"How do customers return a chargeFUZE battery?",opts:["Mail it back within 7 days","Keep it — it's disposable","Return to the same station only","Return to any chargeFUZE location nationwide"],a:3}
]},

{id:2,code:"03",title:"The Pitch",subtitle:"Approach · Script · Objections · Closing",icon:"🎯",dur:"12 min",accent:"#e74c3c",slides:[
{headline:"Timing & Approach.",body:"Visit off-peak — 2-4 PM weekdays for restaurants and bars. Ask for the decision-maker: 'Is the manager or owner available? I have a quick revenue opportunity.'",type:"text",callout:"Lead with value, not features. Start with what it does for them, not what the product is."},
{headline:"The 30-Second Pitch.",body:"Deliver this in under 30 seconds:",type:"pitch",scripts:[{label:"The Open",script:"'We work with [partner name] and [X] other venues in [city]. We place a phone charging station on your counter at no cost to you.'"},{label:"The Value",script:"'Your customers rent portable chargers, and you earn a share of every rental plus advertising revenue. Nothing to install, maintain, or pay for.'"},{label:"Soft Close",script:"'Can I show you the station? Based on your traffic, I think you'd do really well with this.'"}]},
{headline:"Handling Objections.",body:"You'll hear 'no' more than 'yes.' Here's how to handle the most common pushback:",type:"objections",objs:[{q:'"We already have charging cables."',a:"That's costing you money. Cables break, walk off, take staff time. chargeFUZE generates revenue instead — and customers take the charger to their table."},{q:'"No counter space."',a:"The F10 is the size of a toaster. We work with all venue sizes. Can I show you a photo from a similar spot?"},{q:'"We tried this before."',a:"Most older solutions were unreliable. chargeFUZE is used by BWW, Equinox, and Hyatt because the hardware works and the revenue share is real."},{q:'"How much does it cost?"',a:"Zero. No install fee, no monthly fee, no maintenance. You earn revenue from day one."},{q:'"I need to talk to the owner."',a:"Absolutely. Can I leave info and follow up Thursday at 2?"}]},
{headline:"After the Pitch.",body:"Whether it's a yes or a follow-up, here's what you do next:",type:"steps",steps:[
"Assign the venue on Monday.com — name, contact, location, deal status.",
"If follow-up is needed: schedule a specific date/time to reconnect. Never leave without a next step.",
"If it's a YES: walk through the order form with the venue manager on the spot.",
"Revenue split determination — start the conversation at 25% venue share.",
"Schedule delivery with the venue — confirm timeline and placement location.",
"Secure the contract signature before you leave. Digital or physical, get it signed."
]}
],quiz:[
{q:"Best time to approach a restaurant?",opts:["During Friday dinner rush","Right at opening","Off-peak, 2-4 PM weekdays","During a private event"],a:2},
{q:"What should you lead with in your pitch?",opts:["Hardware specs","Company history","Competitor comparison","Revenue share and zero cost"],a:3},
{q:"Venue says 'we have cables.' Best response?",opts:["Agree and leave","Offer a discount","Cables cost money; chargeFUZE generates revenue","Call their cables outdated"],a:2},
{q:"After a verbal 'yes,' your next step is:",opts:["Wait for them to call you back","Walk through the order form, set revenue split, schedule delivery, get the contract signed","Schedule install yourself and leave","Send the venue a personal invoice"],a:1}
]},

],callout:"Week 1 goal: Connect with your RM, review your DMA list, and have at least 5 venue conversations. Reps who start fast earn fast."}

lesson(){const l=LESSONS[curLesson],s=l.slides[curSlide],total=l.slides.length,pct=Math.round(((curSlide+1)/total)*100);let content='';
if(s.type==='text')content=`<div class="sb">${s.body}</div>${s.callout?`<div class="callout">${s.callout}</div>`:''}`;
else if(s.type==='stats')content=`<div class="sb">${s.body}</div><div class="bstat-grid">${s.stats.map(st=>`<div class="bstat"><span class="bstat-n">${st.n}</span><div class="bstat-l">${st.l}</div></div>`).join('')}</div>`;
else if(s.type==='vertmap')content=`<div class="sb">${s.body}</div><div class="vmap">${s.cats.map(c=>`<div class="vmap-row"><div class="vmap-icon">${c.icon}</div><div class="vmap-cat">${c.name}</div><div class="vmap-detail">${c.detail}</div></div>`).join('')}</div>`;
else if(s.type==='bullets')content=`<div class="sb">${s.body}</div><div class="champ-list">${s.bullets.map(b=>`<div class="champ-row"><div class="champ-icon">${b.icon}</div><div class="champ-text">${b.text}</div></div>`).join('')}</div>`;
else if(s.type==='products')content=`<div class="sb">${s.body}</div><div class="pgrid">${s.products.map(p=>`<div class="pcard"><div class="ptag" style="color:${p.color};border-color:${p.color}">${p.tag}</div><div class="pname" style="color:${p.color}">${p.name}</div><div class="pdesc">${p.desc}</div><ul class="pspecs">${p.specs.map(sp=>`<li><span>→</span>${sp}</li>`).join('')}</ul><div class="pbest">${p.best}</div></div>`).join('')}</div>`;
else if(s.type==='pitch')content=`<div class="sb">${s.body}</div><div class="pitchlist">${s.scripts.map(sc=>`<div class="pch"><div class="pchlbl">${sc.label}</div><div class="pchscript">${sc.script}</div></div>`).join('')}</div>`;
else if(s.type==='objections')content=`<div class="sb">${s.body}</div><div class="objlist">${s.objs.map(o=>`<div class="ocard-obj"><div class="oq">${o.q}</div><div class="oa">${o.a}</div></div>`).join('')}</div>`;
